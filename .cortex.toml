[cortex]
name = "demo-cortex"

[memory]
backend = "memory"
embedding_dims = 384
lru_max = 500

[compute]
default_model = "micronn"
max_training_ms = 5000

[server]
host = "0.0.0.0"
port = 9000

[protocols]
a2a_enabled = true
mcp_enabled = true
rest_cors_origins = ["*"]

[tui]
default_shadow_mode = "stream"
dream_idle_seconds = 30.0
